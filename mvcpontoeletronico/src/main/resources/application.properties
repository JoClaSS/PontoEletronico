# Application Name
spring.application.name=mvcpontoeletronico

# Configuração do PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Jackson Configuration for LocalTime/LocalDateTime serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-durations-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.time-zone=America/Sao_Paulo

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Server Configuration
server.port=8081

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.empresa.mvcpontoeletronico=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=32400000

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Admin User Configuration (for initial setup migration)
app.admin.nome=${ADMIN_NOME}
app.admin.email=${ADMIN_EMAIL}
app.admin.senha=${ADMIN_SENHA}
app.admin.cpf=${ADMIN_CPF}

# Application Version
app.version=1.0.0
app.footer.company=Mundial Ciclo - 2026
