# Application Name
spring.application.name=mvcpontoeletronico

# Configuração do PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/pontoeletronico
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Jackson Configuration for LocalTime/LocalDateTime serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-durations-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.time-zone=America/Sao_Paulo

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Server Configuration
server.port=8081

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.empresa.mvcpontoeletronico=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
app.jwt.secret=mySecretKey123456789
app.jwt.expiration=86400000

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174
